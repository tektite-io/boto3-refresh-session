name: Push

on:
  push:
    branches: [main]
    paths:
      - "boto3_refresh_session/**"
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - "LICENSE"
      - "NOTICE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Setup, Lint, and Test
    runs-on: ubuntu-latest
    if: ${{ !(github.actor == 'github-actions[bot]' && contains(github.event.head_commit.message, '[skip ci]')) }}
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          cache-dependency-glob: "**/pyproject.toml"

      - name: Cache uv Dependencies
        id: cached-uv-dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Dependencies
        if: steps.cached-uv-dependencies.outputs.cache-hit != 'true'
        run: uv sync --all-groups --extra iot

      - name: Check Formatting with Ruff
        run: uv run ruff format --check .

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run Unit Tests
        run: uv run pytest tests/ -v

  changes:
    name: Detect Changed Paths
    needs: checks
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.filter.outputs.release }}
      docs_or_code: ${{ steps.filter.outputs.docs_or_code }}
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            release:
              - "boto3_refresh_session/**"
              - "README.md"
              - "pyproject.toml"
              - "LICENSE"
            docs_or_code:
              - "boto3_refresh_session/**"
              - "docs/**"
              - "pyproject.toml"

  release:
    name: Release Please
    needs: [checks, changes]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.release == 'true'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
          target-branch: main

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [release]
    runs-on: ubuntu-latest
    if: needs.release.outputs.release_created == 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/boto3-refresh-session
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build package
        run: uv build

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: [release, publish-testpypi]
    runs-on: ubuntu-latest
    if: needs.release.outputs.release_created == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/boto3-refresh-session
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build package
        run: uv build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  docs:
    name: Build and Deploy Docs
    needs: [checks, changes, publish-pypi]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.changes.outputs.docs_or_code == 'true' &&
      (needs.publish-pypi.result == 'success' || needs.publish-pypi.result == 'skipped')
    permissions:
      contents: write
    steps:
      - name: Check-Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          cache-dependency-glob: "**/pyproject.toml"

      - name: Cache uv Dependencies
        id: cached-uv-dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Dependencies
        if: steps.cached-uv-dependencies.outputs.cache-hit != 'true'
        run: uv sync --all-groups --extra iot

      - name: Build docs
        run: uv run --directory docs make clean html

      - name: Disable Jekyll for built docs directory
        run: touch docs/_build/html/.nojekyll

      - name: Deploy docs to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          enable_jekyll: false
          force_orphan: true
